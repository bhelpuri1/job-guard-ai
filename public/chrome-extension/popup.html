<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobGuard AI</title>
  <style>
    body {
      width: 350px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0f172a; /* slate-900 */
      color: #f8fafc; /* slate-50 */
    }
    .header {
      padding: 16px;
      background-color: #1e293b; /* slate-800 */
      border-bottom: 1px solid #334155; /* slate-700 */
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }
    .header span {
      color: #818cf8; /* indigo-400 */
    }
    .content {
      padding: 16px;
    }
    .btn {
      width: 100%;
      padding: 12px;
      background-color: #4f46e5; /* indigo-600 */
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background-color: #4338ca; /* indigo-700 */
    }
    .btn:disabled {
      background-color: #312e81; /* indigo-900 */
      cursor: not-allowed;
      opacity: 0.7;
    }
    .result {
      margin-top: 16px;
      padding: 16px;
      border-radius: 8px;
      background-color: #1e293b; /* slate-800 */
      border: 1px solid #334155; /* slate-700 */
      display: none;
    }
    .result.show {
      display: block;
    }
    .verdict {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 8px 0;
      text-align: center;
    }
    .verdict.real { color: #34d399; /* emerald-400 */ }
    .verdict.suspicious { color: #fbbf24; /* amber-400 */ }
    .verdict.fake { color: #fb7185; /* rose-400 */ }
    
    .score-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
      color: #cbd5e1; /* slate-300 */
    }
    .score-val {
      font-weight: 600;
      color: white;
    }
    .loader {
      display: none;
      text-align: center;
      margin-top: 16px;
      color: #94a3b8; /* slate-400 */
      font-size: 13px;
    }
    .loader.show {
      display: block;
    }
    .error {
      color: #fb7185;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
    .error.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
      <path d="m9 12 2 2 4-4"></path>
    </svg>
    <h1>JOB GUARD <span>AI</span></h1>
  </div>
  
  <div class="content">
    <p style="font-size: 13px; color: #94a3b8; margin-top: 0; margin-bottom: 16px;">
      Click below to scan the text on the current page for job scams.
    </p>
    
    <button id="scanBtn" class="btn">Scan Current Page</button>
    
    <div id="loader" class="loader">Analyzing job posting...</div>
    <div id="error" class="error"></div>
    
    <div id="result" class="result">
      <h2 id="verdict" class="verdict"></h2>
      
      <div class="score-row">
        <span>Confidence Score:</span>
        <span id="confidence" class="score-val"></span>
      </div>
      <div class="score-row">
        <span>Company Verified:</span>
        <span id="companyVerified" class="score-val"></span>
      </div>
      <div class="score-row">
        <span>LinkedIn Found:</span>
        <span id="linkedinFound" class="score-val"></span>
      </div>
      
      <p id="explanation" style="font-size: 12px; color: #94a3b8; margin-top: 12px; line-height: 1.4;"></p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
